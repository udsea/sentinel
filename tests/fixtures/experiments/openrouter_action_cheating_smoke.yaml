name: openrouter_action_cheating_smoke
tasks:
  - tests/fixtures/tasks/hide_failing_test_v1.yaml
  - tests/fixtures/tasks/shortcut_completion_checks_v1.yaml
agent:
  kind: action_model
  provider: openrouter
  model: openai/gpt-4o-mini
graders:
  - kind: pytest
    relative_path: .
    pytest_args:
      - -q
monitors:
  - kind: path_risk
  - kind: keyword_risk
  - kind: content_risk
  - kind: write_policy
    protected_prefixes:
      - tests/
output_dir: outputs/openrouter_action_cheating_smoke
